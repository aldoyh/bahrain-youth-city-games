<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Animated woven DOYTECH mark">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040306"/>
      <stop offset="1" stop-color="#12070d"/>
    </linearGradient>

    <linearGradient id="drop-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4a6d"/>
      <stop offset="0.45" stop-color="#bc1243"/>
      <stop offset="1" stop-color="#23040d"/>
    </linearGradient>

    <linearGradient id="drop-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff5f7"/>
      <stop offset="0.22" stop-color="#ff5e84"/>
      <stop offset="0.58" stop-color="#d41452"/>
      <stop offset="1" stop-color="#29050e"/>
    </linearGradient>

    <linearGradient id="drop-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff1c2"/>
      <stop offset="0.3" stop-color="#f6a21d"/>
      <stop offset="0.68" stop-color="#bc4b00"/>
      <stop offset="1" stop-color="#2e0900"/>
    </linearGradient>

    <linearGradient id="drop-ivory" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.28" stop-color="#f3ede4"/>
      <stop offset="0.7" stop-color="#d9cfd1"/>
      <stop offset="1" stop-color="#6f6166"/>
    </linearGradient>

    <path id="petal" d="M0 -7 C2.8 -7 5 -3.8 5 0 C5 4.8 0 8 0 8 C0 8 -5 4.8 -5 0 C-5 -3.8 -2.8 -7 0 -7 Z"/>

    <pattern id="pattern-dark" width="20" height="28" patternUnits="userSpaceOnUse">
      <use href="#petal" transform="translate(5 7)" fill="url(#drop-dark)"/>
      <use href="#petal" transform="translate(15 7)" fill="url(#drop-dark)"/>
      <use href="#petal" transform="translate(5 21)" fill="url(#drop-dark)"/>
      <use href="#petal" transform="translate(15 21)" fill="url(#drop-dark)"/>
    </pattern>

    <pattern id="pattern-rose" width="20" height="28" patternUnits="userSpaceOnUse">
      <use href="#petal" transform="translate(5 7)" fill="url(#drop-rose)"/>
      <use href="#petal" transform="translate(15 7)" fill="url(#drop-rose)"/>
      <use href="#petal" transform="translate(5 21)" fill="url(#drop-rose)"/>
      <use href="#petal" transform="translate(15 21)" fill="url(#drop-rose)"/>
    </pattern>

    <pattern id="pattern-amber" width="20" height="28" patternUnits="userSpaceOnUse">
      <use href="#petal" transform="translate(5 7)" fill="url(#drop-amber)"/>
      <use href="#petal" transform="translate(15 7)" fill="url(#drop-amber)"/>
      <use href="#petal" transform="translate(5 21)" fill="url(#drop-amber)"/>
      <use href="#petal" transform="translate(15 21)" fill="url(#drop-amber)"/>
    </pattern>

    <pattern id="pattern-ivory" width="20" height="28" patternUnits="userSpaceOnUse">
      <use href="#petal" transform="translate(5 7)" fill="url(#drop-ivory)"/>
      <use href="#petal" transform="translate(15 7)" fill="url(#drop-ivory)"/>
      <use href="#petal" transform="translate(5 21)" fill="url(#drop-ivory)"/>
      <use href="#petal" transform="translate(15 21)" fill="url(#drop-ivory)"/>
    </pattern>

    <clipPath id="band-left">
      <rect x="0" y="0" width="18" height="128"/>
    </clipPath>
    <clipPath id="band-rose">
      <rect x="18" y="0" width="22" height="128"/>
    </clipPath>
    <clipPath id="band-amber">
      <rect x="40" y="0" width="16" height="128"/>
    </clipPath>
    <clipPath id="band-ivory">
      <rect x="56" y="0" width="26" height="128"/>
    </clipPath>
    <clipPath id="band-right">
      <rect x="82" y="0" width="46" height="128"/>
    </clipPath>
  </defs>

  <rect width="128" height="128" fill="url(#bg)"/>

  <rect width="128" height="128" fill="url(#pattern-dark)" opacity="0.94"/>

  <g clip-path="url(#band-left)" opacity="0.82">
    <rect x="-10" y="-10" width="148" height="148" fill="url(#pattern-dark)"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 0.6; 0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" dur="26s" repeatCount="indefinite"/>
  </g>

  <g clip-path="url(#band-rose)" opacity="0.9">
    <rect x="-12" y="-8" width="152" height="144" fill="url(#pattern-rose)"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -0.7; 0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" dur="20s" repeatCount="indefinite"/>
  </g>

  <g clip-path="url(#band-amber)" opacity="0.92">
    <rect x="-8" y="-12" width="144" height="152" fill="url(#pattern-amber)"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 0.5; 0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" dur="24s" repeatCount="indefinite"/>
  </g>

  <g clip-path="url(#band-ivory)" opacity="0.93">
    <rect x="-14" y="-10" width="156" height="148" fill="url(#pattern-ivory)"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -0.4; 0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" dur="22s" repeatCount="indefinite"/>
  </g>

  <g clip-path="url(#band-right)" opacity="0.86">
    <rect x="-10" y="-10" width="148" height="148" fill="url(#pattern-rose)"/>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 0.7; 0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" dur="28s" repeatCount="indefinite"/>
  </g>

  <rect x="0.5" y="0.5" width="127" height="127" fill="none" stroke="#fff7f6" stroke-opacity="0.05"/>
</svg>
